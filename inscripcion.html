<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Hogwarts Patagónico Express</title>

    <!--Links para el css-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <script src="https://kit.fontawesome.com/de9a64cf5c.js" crossorigin="anonymous"></script>
</head>
<body>

    <!--NavBar-->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#inicio">
                <img src="assets/img/logo.png" alt="Logo" width="70">
            </a>
            <button class="navbar-toggler" type="button"data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-house-user fa-2x"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- Formulario -->
    
    <section id="inscripcion" class="py-5">

        <div class="container">

            <h2 class="text-center mb-5">Inscripción</h2>

            <form>
                <!-- Fila 1 -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" placeholder="Ingrese su nombre">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" placeholder="Ingrese su apellido">
                    </div>
                </div>

                <!-- Fila 2 -->
                <div class="row mb-3">

                    <div class="col-md-6">
                        <label class="form-label">DNI</label>
                        <input type="text" class="form-control" placeholder="12345678">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" placeholder="correo@ejemplo.com">
                    </div>
                </div>

                <!-- Fila 3 -->
                <div class="row mb-4">

                    <div class="col-md-6">
                        <label class="form-label">Número Telefónico</label>
                        <input type="tel" class="form-control" placeholder="+54 9 11 1234 5678">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Medio de Pago</label>

                        <select class="form-select">
                            <option selected>Seleccione una opción</option>
                            <option>Tarjeta de Crédito</option>
                            <option>Tarjeta de Débito</option>
                            <option>Transferencia Bancaria</option>
                            <option>Mercado Pago</option>
                        </select>
                    </div>

                </div>

                <!-- Botón -->
                <div class="text-center">
                    <button type="submit" class="btn btn-warning btn-lg"> Reservar Lugar</button>
                </div>
            </form>
        </div>
    </section>



    <!--Footer-->
    <footer class="footer text-center py-4">
        <div class="container">
            <h5>Hogwarts Patagónico Express</h5>
            <p>Esto es un proyecto académico ficticio realizada para la materia de Prácticas lúdicas.</p>
            
            <div class="mt-3">
                <i class="fa-brands fa-instagram fa-lg mx-2"></i>
                <i class="fa-brands fa-facebook fa-lg mx-2"></i>
                <i class="fa-brands fa-x-twitter fa-lg mx-2"></i>
                <i class="fa-brands fa-youtube fa-lg mx-2"></i>
            </div>
        </div>
    </footer>

    
    <!-- Link del bootstrap js-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
</body>
</html>
